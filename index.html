<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css" />
    <script type="importmap">
      {
        "imports": {
          "@material/web/": "https://esm.run/@material/web/"
        }
      }
    </script>
    <script type="module">
      import "@material/web/all.js";
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
  </head>
  <body>
    <div id="app-layout">
      <header class="app-header">
        <section class="card-kpi">
          <div id="kpi-info" class="card-content"></div>
        </section>
      </header>

      <main class="app-content">
        <div id="map-view"></div>

        <aside id="sidebar" class="sidebar">
          <section class="card-panel">
            <h2 class="card-title">Buscar por Município</h2>
            <div class="card-content">
              <div class="search-group">
                <md-outlined-select
                  id="municipio-select"
                  class="search-select"
                  onchange="searchMunicipio(this.value)"
                >
                  <md-select-option aria-label="blank"></md-select-option>
                  <md-select-option selected value=""
                    ><div slot="headline">
                      Selecione um município...
                    </div></md-select-option
                  >
                </md-outlined-select>
                <md-outlined-button onclick="clearSearch()">
                  Limpar
                </md-outlined-button>
              </div>
              <div id="municipio-info" class="info-display"></div>
            </div>
          </section>
        </aside>
      </main>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
      const LINK_DADOS_OUVIDORIAS =
        "https://docs.google.com/spreadsheets/d/e/2PACX-1vRobcas-tpCfY7raLWp7AvvCKt4g2QKfMrxkFTZcQ2PljaTRE5PkVFu33JSg7uGj_PlW308G-vPw4ZQ/pub?gid=0&single=true&output=csv";

      const URL_FINAL = LINK_DADOS_OUVIDORIAS + "&t=" + new Date().getTime();

      const MAP_SETTINGS = {
        center: [-5.3, -39.5],
        minZoom: 7,
        maxZoom: 9,
        boxZoom: false,
        doubleClickZoom: false,
        keyboard: false,
        scrollWheelZoom: false,
        touchZoom: false,
        attributionControl: false,
      };

      let map = L.map("map-view", MAP_SETTINGS);
      let mapLegend = L.control({ position: "bottomright" });
      let geojsonLayer = null;
      let municipiosData = []; // Municipio no Mapa
      let csvData = {}; //Dados do CSV de cada município
      let selectedLayer = null;
      let selectedLayerColor = null;

      fetch(URL_FINAL)
        .then((response) => response.text())
        .then((csv) => {
          Papa.parse(csv, {
            header: true,
            skipEmptyLines: true,
            transformHeader: (header) => header.toLowerCase().trim(),
            complete: function (results) {
              results.data.forEach((row) => {
                const municipio = normalizarTexto(row.municipio);
                const ente = normalizarTexto(row.ente);

                if (!municipio) return;

                if (!csvData[municipio]) {
                  csvData[municipio] = {};
                }

                if (!csvData[municipio][ente]) {
                  csvData[municipio][ente] = [];
                }

                csvData[municipio][ente].push(row);
              });

              addKpi(csvData);

              loadMap();

              addLegend(map);
            },
          });
        });

      function loadMap() {
        fetch("./geojson-municipios-ceara.json")
          .then((response) => response.json())
          .then((data) => {
            // 1. Criamos a camada GeoJSON
            geojsonLayer = L.geoJson(data, {
              style: function (feature) {
                const municipioMapa = normalizarTexto(feature.properties.name);
                let temOuvidoria = false;

                // Busca o município no csvData (comparando nomes normalizados)
                const chaveMunicipio = Object.keys(csvData).find(
                  (key) => normalizarTexto(key) === municipioMapa,
                );

                if (chaveMunicipio && csvData[chaveMunicipio]) {
                  const dadosMunicipio = csvData[chaveMunicipio];

                  // Critério: Apenas se houver informação de PREFEITURA
                  const chavePrefeitura = Object.keys(dadosMunicipio).find(
                    (key) => normalizarTexto(key) === "PREFEITURA",
                  );

                  if (
                    chavePrefeitura &&
                    dadosMunicipio[chavePrefeitura].length > 0
                  ) {
                    const registro = dadosMunicipio[chavePrefeitura][0];

                    const evidencia =
                      registro["evidencia de instrucao normativa"];

                    temOuvidoria = evidencia === "Sim";
                  }
                }

                return {
                  color: "#000",
                  weight: 1,
                  fillColor: temOuvidoria ? "#134383" : "#d3d3d3",
                  fillOpacity: 1.0,
                };
              },
              onEachFeature: function (feature, layer) {
                const nomeOriginal = feature.properties.name;
                const nomeNormalizado = normalizarTexto(nomeOriginal);

                // Armazenamento para busca rápida (Dicionário)
                municipiosData[nomeNormalizado] = {
                  name: nomeOriginal,
                  layer: layer,
                };

                // Tooltip (Nome do município ao passar o mouse)
                layer.bindTooltip(nomeOriginal, {
                  sticky: true,
                  direction: "auto",
                  className: "map-tooltip",
                });

                // Eventos de Interatividade
                layer.on({
                  mouseover: (e) => {
                    const el = e.target;

                    if (el != selectedLayer) {
                      el.setStyle({
                        weight: 2,
                        color: "#FFF",
                        fillOpacity: 0.8,
                      });
                    }
                  },
                  mouseout: (e) => {
                    if (e.target != selectedLayer) {
                      geojsonLayer.resetStyle(e.target);
                    }
                  },
                  click: () => searchMunicipio(nomeOriginal),
                });
              },
            }).addTo(map);

            // 2. População do Select
            popularSelect(data.features);

            // 3. Configuração de limites
            const CearaBounds = geojsonLayer.getBounds().pad(0.1);
            map.setMaxBounds(CearaBounds);

            ajustarLayout();
          })
          .catch((err) => console.error("Erro ao carregar GeoJSON:", err));
      }

      function addLegend(map) {
        mapLegend.onAdd = function (map) {
          const div = L.DomUtil.create("div", "legend");

          div.innerHTML = `
            <div class="map-legend">
              <div class="legend-title">Legenda</div>

              <div class="legend-item">
                <span class="color-box azul"></span>
                <span class="legend-text">Com ouvidoria</span>
              </div>

              <div class="legend-item">
                <span class="color-box cinza"></span>
                <span class="legend-text">Sem ouvidoria</span>
              </div>
            </div>
          `;

          return div;
        };

        mapLegend.addTo(map);
      }

      function searchMunicipio(selectedMunicipio) {
        if (!selectedMunicipio) return;

        // 1. Normalização para garantir o "match" perfeito
        const nomeNormalizado = normalizarTexto(selectedMunicipio);
        const municipioAlvo = municipiosData[nomeNormalizado];

        if (municipioAlvo) {
          const layer = municipioAlvo.layer;

          // 2. Lógica de Destaque Visual (Highlight)
          // Se já havia um município selecionado, resetamos a cor dele
          if (selectedLayer && geojsonLayer) {
            geojsonLayer.resetStyle(selectedLayer);
          }

          // Guardamos o estado atual e destacamos o novo
          selectedLayer = layer;
          layer.setStyle({
            fillColor: "yellow",
            weight: 3,
            color: "#000",
            fillOpacity: 0.8,
          });

          if (window.innerWidth < 768) {
            // Usamos flyToBounds para um movimento suave de BI
            map.flyToBounds(layer.getBounds(), {
              padding: [50, 50], // Espaço livre nas bordas
              duration: 1.5, // Tempo da animação em segundos
            });

            // Se você quiser que o mapa suba para o topo da tela ao selecionar:
            window.scrollTo({ top: 0, behavior: "smooth" });
          } else {
            // No Desktop, apenas um ajuste sutil se o município estiver fora da visão
            if (!map.getBounds().contains(layer.getBounds())) {
              map.panTo(layer.getBounds().getCenter());
            }
          }

          // 4. Busca e Exibição dos Dados no Painel Lateral
          // Procuramos no csvData usando a chave normalizada
          const chaveCsv = Object.keys(csvData).find(
            (k) => normalizarTexto(k) === nomeNormalizado,
          );
          const dadosMunicipio = csvData[chaveCsv] || {};

          const select = document.getElementById("municipio-select");

          if (select) {
            select.value = municipioAlvo.name;
          }

          const municipioInfoDiv = document.getElementById("municipio-info");

          if (Object.keys(dadosMunicipio).length === 0) {
            municipioInfoDiv.innerHTML = `
              <div class="info-header">
                <h3>${selectedMunicipio}</h3>
                <p class="u-text-danger">Não há registros de ouvidoria cadastrados.</p>
              </div>
            `;
            return;
          }

          // Montagem do HTML de informações
          let infoHTML = `<div class="info-header"><h3>${selectedMunicipio}</h3></div>`;

          // Iteramos pelos entes (Prefeitura, Câmara, etc.)
          Object.keys(dadosMunicipio).forEach((ente) => {
            const d = dadosMunicipio[ente][0];

            const infoRow = (label, value) =>
              value
                ? `<div class="info-row">
                    <span class="info-row-label">${label}:</span>
                    <span class="info-row-value">${value}</span>
                  </div>`
                : "";

            // Itens do Conteúdo
            const ouvidorItem = infoRow("Ouvidor(a)", d.ouvidor);

            const emailItem = infoRow(
              "E-mail",
              d["e-mail"]
                ? `<a href="mailto:${d["e-mail"]}">${d["e-mail"]}</a>`
                : "",
            );

            const contatosItem = infoRow(
              "Contato(s)",
              `${d.telefone} ${d.telefone && d.whatsapp ? "|" : ""} ${d.whatsapp}`.trim(),
            );

            const enderecoItem = infoRow("Endereço", d["endereço"]);

            const horarioItem = infoRow(
              "Horário de funcionamento",
              d["horario de funcionamento"],
            );

            // Botões do Conteúdo (Site e Instrução Normativa)
            const temInstrucaoNormativa =
              d["evidencia de instrucao normativa"]?.toLowerCase() === "sim";

            const instrucaoNormativaItem = temInstrucaoNormativa
              ? `<md-filled-button href="${d["link da instrucao normativa"]}" target="_blank" class="link link-norma">Acesse o intrumento normativo da Ouvidoria</md-filled-button>`
              : "";

            const siteItem = d.site
              ? `<md-filled-button href="${d.site}" target="_blank" class="link link-ouvidoria">Acesse a página eletrônica da Ouvidoria</md-filled-button>`
              : "";

            infoHTML += `
            <div class="card">
              <div class="card-header">${ente.toUpperCase()}</div>
              <div class="card-body">
                ${ouvidorItem}
                ${emailItem}
                ${contatosItem}
                ${enderecoItem}
                ${horarioItem}
                <div class="card-actions">
                  ${siteItem}
                  ${instrucaoNormativaItem}
                </div>
              </div>
            </div>`;
          });

          municipioInfoDiv.innerHTML = infoHTML;
        } else {
          console.error(
            "Município não encontrado na base geográfica:",
            nomeNormalizado,
          );
        }
      }

      // Função para limpar a busca e resetar o mapa
      function clearSearch() {
        document.getElementById("municipio-select").value = "";
        document.getElementById("municipio-info").innerHTML = "";

        if (selectedLayer && geojsonLayer) {
          geojsonLayer.resetStyle(selectedLayer);
        }

        selectedLayer = null;
      }

      // Função auxiliar para popular o SELECT em ordem alfabética
      function popularSelect(features) {
        const select = document.getElementById("municipio-select");
        if (!select) return;

        // Limpa tudo, exceto o placeholder
        select.innerHTML =
          '<md-select-option selected value=""><div slot="headline">Selecione um município...</div></md-select-option>';

        features.forEach((f) => {
          const nome = f.properties.name;
          const option = document.createElement("md-select-option");
          option.value = nome;

          // No Material 3, o texto vai dentro de um slot chamado "headline"
          option.innerHTML = `<div slot="headline">${nome}</div>`;

          select.appendChild(option);
        });
      }

      function addKpi(baseConsolidada) {
        const kpiInfoDiv = document.getElementById("kpi-info");

        if (!kpiInfoDiv) return;

        const { total, porcentagemComNorma, porcentagemSemNorma } =
          calcularCobertura(baseConsolidada);

        let infoHTML = `
            <div class="kpi-main">
              <div class="kpi-section">
                <span class="kpi-percent">${porcentagemComNorma}%</span>
                <span class="kpi-label">Municípios com ouvidoria instituída</span>
                <div class="kpi-footer">
                  <strong>${total}</strong> de 184 munícipios do Ceará
                </div>
              </div>
            </div>
          `;

        kpiInfoDiv.innerHTML = infoHTML;
      }

      function calcularCobertura(baseConsolidada) {
        const TOTAL_MUNICIPIOS = 184; // Total fixo para o estado do Ceará
        let contadorPrefeiturasComNorma = 0;
        let contadorPrefeiturasSemNorma = 0;

        // Percorre as chaves do objeto consolidado
        for (const chave in baseConsolidada) {
          const entesNoMunicipio = baseConsolidada[chave];

          if (entesNoMunicipio["PREFEITURA"]) {
            const dadosPrefeitura = entesNoMunicipio["PREFEITURA"][0];
            const evidencia =
              dadosPrefeitura["evidencia de instrucao normativa"];

            if (evidencia && evidencia.toLowerCase() === "sim") {
              contadorPrefeiturasComNorma++;
            } else {
              contadorPrefeiturasSemNorma++;
            }
          }
        }

        // Cálculo da porcentagem
        const porcentagemComNorma =
          (contadorPrefeiturasComNorma / TOTAL_MUNICIPIOS) * 100;

        const porcentagemSemNorma =
          (contadorPrefeiturasSemNorma / TOTAL_MUNICIPIOS) * 100;

        return {
          total: contadorPrefeiturasComNorma,
          porcentagemComNorma: porcentagemComNorma.toFixed(1),
          porcentagemSemNorma: porcentagemSemNorma.toFixed(1),
        };
      }

      function normalizarTexto(texto) {
        if (!texto) return "";
        return texto
          .toString()
          .normalize("NFD") // Decompõe caracteres acentuados (ex: á -> a + ´)
          .replace(/[\u0300-\u036f]/g, "") // Remove os acentos
          .toUpperCase() // Tudo em maiúsculo
          .trim(); // Remove espaços extras
      }

      function ajustarLayout() {
        if (!map) return;

        // 1. Avisa o Leaflet que o tamanho do div mudou
        map.invalidateSize({ animate: true });

        // 2. Re-enquadra o GeoJSON com um pequeno atraso para o CSS estabilizar
        if (geojsonLayer) {
          setTimeout(() => {
            map.invalidateSize({ animate: true });
            map.fitBounds(geojsonLayer.getBounds(), {
              padding: window.innerWidth < 768 ? [10, 10] : [30, 30],
            });
          }, 200);
        }
      }

      window.addEventListener("resize", () => {
        // Debounce simples para não sobrecarregar o processador
        clearTimeout(window.resizeTimer);
        window.resizeTimer = setTimeout(ajustarLayout, 250);
      });
    </script>
  </body>
</html>
